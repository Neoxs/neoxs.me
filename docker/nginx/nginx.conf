worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker's embedded DNS — enables graceful upstream re-resolution on container restart
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    upstream shell_upstream     { server shell:3000;     keepalive 32; }
    upstream mfe_blog_upstream  { server mfe-blog:3002;  keepalive 16; }
    upstream mfe_lab_upstream   { server mfe-lab:3003;   keepalive 16; }
    upstream mfe_infra_upstream { server mfe-infra:3004; keepalive 16; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options        SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff    always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Nuxt internal paths (highest priority) ──────────────────────────
        # /_nuxt/ contains Vite-generated chunks for the Nuxt app.
        # /api/_content/ is the @nuxt/content query API.
        location /_nuxt/ {
            proxy_pass         http://mfe_blog_upstream/_nuxt/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location /api/_content/ {
            proxy_pass         http://mfe_blog_upstream/api/_content/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # ── Next.js static assets ───────────────────────────────────────────
        location /_next/static/ {
            proxy_pass         http://shell_upstream/_next/static/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location /_next/ {
            proxy_pass         http://shell_upstream/_next/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Blog MFE (Nuxt SSR) ─────────────────────────────────────────────
        location /blog {
            proxy_pass         http://mfe_blog_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_buffering    off;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── Lab MFE (Vite SPA, served by nginx) ────────────────────────────
        location = /lab { return 301 /lab/; }
        location /lab/ {
            proxy_pass         http://mfe_lab_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Infra MFE (Vite SPA, served by nginx) ──────────────────────────
        location = /infra { return 301 /infra/; }
        location /infra/ {
            proxy_pass         http://mfe_infra_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Shell / catch-all (Next.js SSR) ────────────────────────────────
        location / {
            proxy_pass         http://shell_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_buffering    off;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── Health check ────────────────────────────────────────────────────
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
