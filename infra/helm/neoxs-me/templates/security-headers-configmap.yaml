# ConfigMap for security response headers.
#
# nginx.ingress.kubernetes.io/add-headers points to this ConfigMap.
# The ingress-nginx controller injects these headers into every response
# that passes through the Ingress — without needing `configuration-snippet`.
#
# This is the recommended pattern: no snippet = no admission webhook block,
# and headers are easy to audit in one place.
apiVersion: v1
kind: ConfigMap
metadata:
  name: security-headers
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neoxs-me.labels" . | nindent 4 }}
data:
  X-Frame-Options: "SAMEORIGIN"
  X-Content-Type-Options: "nosniff"
  Referrer-Policy: "strict-origin-when-cross-origin"
  Strict-Transport-Security: "max-age=31536000; includeSubDomains"
  Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=()"
  Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
