# ── NetworkPolicy ─────────────────────────────────────────────────────────────
#
# Defence-in-depth: even if one container is compromised, restrict which pods
# it can reach inside the cluster.
#
# Rules:
#   1. Default-deny all ingress to every pod in this namespace.
#   2. ingress-nginx → any pod   (external traffic via Ingress)
#   3. shell → mfe-blog/mfe-lab/mfe-infra  (Next.js server-side proxy rewrites)
#   4. All pods can initiate egress freely (DNS, cert-manager ACME, npm, etc.)

# ── 1. Default deny all ingress ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neoxs-me.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# ── 2. Allow ingress-nginx controller → all pods ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neoxs-me.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
# ── 3. Allow shell → MFE pods (server-side proxy for MFE_BLOG_URL etc.) ──────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-shell-to-mfes
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neoxs-me.labels" . | nindent 4 }}
spec:
  # Applied to each MFE pod — allows inbound traffic from the shell pod
  podSelector:
    matchLabels:
      {{- include "neoxs-me.selectorLabels" (dict "name" "mfe-blog" "Release" .Release) | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "neoxs-me.selectorLabels" (dict "name" "shell" "Release" .Release) | nindent 14 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-shell-to-mfe-lab
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neoxs-me.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "neoxs-me.selectorLabels" (dict "name" "mfe-lab" "Release" .Release) | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "neoxs-me.selectorLabels" (dict "name" "shell" "Release" .Release) | nindent 14 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-shell-to-mfe-infra
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neoxs-me.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "neoxs-me.selectorLabels" (dict "name" "mfe-infra" "Release" .Release) | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "neoxs-me.selectorLabels" (dict "name" "shell" "Release" .Release) | nindent 14 }}
