name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which apps changed ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      shell:     ${{ steps.filter.outputs.shell }}
      mfe-blog:  ${{ steps.filter.outputs.mfe-blog }}
      mfe-lab:   ${{ steps.filter.outputs.mfe-lab }}
      mfe-infra: ${{ steps.filter.outputs.mfe-infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shell:
              - 'apps/shell/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            mfe-blog:
              - 'apps/mfe-blog/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            mfe-lab:
              - 'apps/mfe-lab/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            mfe-infra:
              - 'apps/mfe-infra/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # ── Unit + integration tests (all packages & apps) ─────────────────────────
  test:
    uses: ./.github/workflows/reusable-test.yml
    with:
      node-version: '22'

  # ── Docker builds (only for changed apps, only on main push) ───────────────
  build-shell:
    needs: [changes, test]
    if: needs.changes.outputs.shell == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-docker.yml
    with:
      app: shell
      image: ghcr.io/neoxs/neoxs-me-shell
      dockerfile: apps/shell/Dockerfile
    permissions:
      contents: read
      packages: write

  build-mfe-blog:
    needs: [changes, test]
    if: needs.changes.outputs['mfe-blog'] == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-docker.yml
    with:
      app: mfe-blog
      image: ghcr.io/neoxs/neoxs-me-mfe-blog
      dockerfile: apps/mfe-blog/Dockerfile
    permissions:
      contents: read
      packages: write

  build-mfe-lab:
    needs: [changes, test]
    if: needs.changes.outputs['mfe-lab'] == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-docker.yml
    with:
      app: mfe-lab
      image: ghcr.io/neoxs/neoxs-me-mfe-lab
      dockerfile: apps/mfe-lab/Dockerfile
    permissions:
      contents: read
      packages: write

  build-mfe-infra:
    needs: [changes, test]
    if: needs.changes.outputs['mfe-infra'] == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/reusable-docker.yml
    with:
      app: mfe-infra
      image: ghcr.io/neoxs/neoxs-me-mfe-infra
      dockerfile: apps/mfe-infra/Dockerfile
    permissions:
      contents: read
      packages: write

  # ── Workflow summary (images + informational Trivy) — main push only ─────────
  # Best practice: keep vulnerability scans separate from build/push so a noisy
  # CVE report never blocks shipping images. This job always exits successfully;
  # see each Trivy section in the job summary for findings (CRITICAL/HIGH).
  publish-summary:
    name: Workflow summary (GHCR + Trivy)
    needs: [build-shell, build-mfe-blog, build-mfe-lab, build-mfe-infra]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Write image inventory
        env:
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RS: ${{ needs.build-shell.result }}
          TS: ${{ needs.build-shell.outputs.tags }}
          PS: ${{ needs.build-shell.outputs.image_pin }}
          RB: ${{ needs.build-mfe-blog.result }}
          TB: ${{ needs.build-mfe-blog.outputs.tags }}
          PB: ${{ needs.build-mfe-blog.outputs.image_pin }}
          RL: ${{ needs.build-mfe-lab.result }}
          TL: ${{ needs.build-mfe-lab.outputs.tags }}
          PL: ${{ needs.build-mfe-lab.outputs.image_pin }}
          RI: ${{ needs.build-mfe-infra.result }}
          TI: ${{ needs.build-mfe-infra.outputs.tags }}
          PI: ${{ needs.build-mfe-infra.outputs.image_pin }}
        run: bash .github/scripts/ci-publish-summary.sh write-images

      - name: Log in to GHCR (read-only for Trivy pull)
        if: |
          needs.build-shell.result == 'success' ||
          needs.build-mfe-blog.result == 'success' ||
          needs.build-mfe-lab.result == 'success' ||
          needs.build-mfe-infra.result == 'success'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — shell
        id: trivy_shell
        if: needs.build-shell.result == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-shell.outputs.image_pin }}
          format: json
          output: trivy-shell.json
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Append Trivy — shell to summary
        if: needs.build-shell.result == 'success'
        run: bash .github/scripts/ci-publish-summary.sh append-trivy trivy-shell.json shell

      - name: Trivy — mfe-blog
        id: trivy_mfe_blog
        if: needs.build-mfe-blog.result == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-mfe-blog.outputs.image_pin }}
          format: json
          output: trivy-mfe-blog.json
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Append Trivy — mfe-blog to summary
        if: needs.build-mfe-blog.result == 'success'
        run: bash .github/scripts/ci-publish-summary.sh append-trivy trivy-mfe-blog.json mfe-blog

      - name: Trivy — mfe-lab
        id: trivy_mfe_lab
        if: needs.build-mfe-lab.result == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-mfe-lab.outputs.image_pin }}
          format: json
          output: trivy-mfe-lab.json
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Append Trivy — mfe-lab to summary
        if: needs.build-mfe-lab.result == 'success'
        run: bash .github/scripts/ci-publish-summary.sh append-trivy trivy-mfe-lab.json mfe-lab

      - name: Trivy — mfe-infra
        id: trivy_mfe_infra
        if: needs.build-mfe-infra.result == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-mfe-infra.outputs.image_pin }}
          format: json
          output: trivy-mfe-infra.json
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Append Trivy — mfe-infra to summary
        if: needs.build-mfe-infra.result == 'success'
        run: bash .github/scripts/ci-publish-summary.sh append-trivy trivy-mfe-infra.json mfe-infra

  # ── E2E tests — full stack via Docker Compose (main push only) ─────────────
  e2e:
    needs: [build-shell, build-mfe-blog, build-mfe-lab, build-mfe-infra]
    if: |
      always() &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Compose stack
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for stack to be healthy
        run: |
          timeout 120 bash -c '
            until curl -sf http://localhost/healthz; do
              echo "waiting for stack..."; sleep 5
            done
          '

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter e2e test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down
