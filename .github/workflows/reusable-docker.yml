name: Reusable — Docker build & push

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      image:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
    outputs:
      digest:
        description: Image digest pushed to GHCR
        value: ${{ jobs.docker.outputs.digest }}
      image:
        description: Image repository (no tag or digest)
        value: ${{ jobs.docker.outputs.image }}
      image_pin:
        description: Immutable reference image@sha256:…
        value: ${{ jobs.docker.outputs.image_pin }}
      tags:
        description: Comma-separated tags pushed alongside digest
        value: ${{ jobs.docker.outputs.tags }}

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image: ${{ inputs.image }}
      image_pin: ${{ inputs.image }}@${{ steps.push.outputs.digest }}
      tags: ${{ steps.tagsflat.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to:   type=gha,scope=${{ inputs.app }},mode=max

      - name: Flatten tags for workflow outputs
        id: tagsflat
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tags=$(printf '%s\n' "$META_TAGS" | paste -sd ',' -)
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
