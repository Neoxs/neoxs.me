server {
    listen 3004;
    server_name _;

    # Emit relative Location headers so redirects work behind a proxy on any port.
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    location /infra/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /infra/ {
        try_files $uri $uri/ /infra/index.html;
    }

    location = /infra {
        return 301 /infra/;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
