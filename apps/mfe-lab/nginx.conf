server {
    listen 3003;
    server_name _;

    # Emit relative Location headers (e.g. /lab/ instead of http://localhost/lab/)
    # so redirects work correctly when behind a proxy on a non-standard port.
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    location /lab/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /lab/ {
        try_files $uri $uri/ /lab/index.html;
    }

    location = /lab {
        return 301 /lab/;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
